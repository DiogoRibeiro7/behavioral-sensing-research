repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        args: [--line-length=88]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--follow-imports=skip"]
        additional_dependencies: []
        files: "^sensor_modeling/"
  - repo: local
    hooks:
      - id: radon
        name: radon-complexity
        entry: python -m radon cc -nc
        language: python
        additional_dependencies: [radon]
        files: "^sensor_modeling/.*\\.py$"
